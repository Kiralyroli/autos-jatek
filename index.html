<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autós játék — Fázis 1</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1e;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #cfd2da;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 12px;
        border-radius: 8px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
      }
      #hud b { color: #fff; }
      #hud kbd {
        background: #2c2f3a;
        border-radius: 4px;
        padding: 1px 6px;
        font-family: ui-monospace, monospace;
      }
      #hud a {
        color: #7fb0ff;
        pointer-events: auto;
      }
      /* Kör- és időkijelző — felül középen, jól látható. */
      #raceinfo {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        align-items: center;
        gap: 18px;
        font-family: system-ui, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 12px;
        pointer-events: none;
        user-select: none;
        font-variant-numeric: tabular-nums;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      }
      #raceinfo .ri-lap {
        font-size: 30px;
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
      }
      #raceinfo .ri-lap #lap { font-size: 34px; }
      #raceinfo .ri-times {
        border-left: 1px solid rgba(255, 255, 255, 0.22);
        padding-left: 18px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      #raceinfo .ri-row { font-size: 18px; }
      #raceinfo .ri-row b { font-weight: 700; }
      #raceinfo .ri-best b { color: #ffd54a; }
      #raceinfo .ri-label {
        font-size: 12px;
        letter-spacing: 0.06em;
        color: #b6bac4;
        text-transform: uppercase;
      }
      /* Végeredmény-lista (a #results overlay panelben). */
      #resultsList {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 4px 0 8px;
        font-variant-numeric: tabular-nums;
      }
      #resultsList .res {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #262a35;
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 15px;
      }
      #resultsList .res.me { background: #2e3a4f; outline: 1px solid #4a6a9e; }
      #resultsList .res .pos {
        font-weight: 800;
        font-size: 17px;
        min-width: 26px;
        text-align: center;
      }
      #resultsList .res .rname { flex: 1; font-weight: 600; }
      #resultsList .res .rtime { color: #b6bac4; }
      #resultsList .res .dnf { color: #d9663f; }
      #countdown {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: system-ui, sans-serif;
        font-weight: 800;
        color: #fff;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.65);
        pointer-events: none;
        user-select: none;
      }
      #wrongway {
        position: fixed;
        top: 14%;
        left: 0;
        right: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-family: system-ui, sans-serif;
        font-size: 42px;
        font-weight: 800;
        color: #ff4b3e;
        text-shadow: 0 3px 16px rgba(0, 0, 0, 0.7);
        pointer-events: none;
        user-select: none;
        animation: wrongway-blink 0.6s step-start infinite;
      }
      #wrongway .sign {
        font-size: 84px;
        line-height: 1;
      }
      @keyframes wrongway-blink {
        50% {
          opacity: 0.15;
        }
      }
      #restart {
        position: fixed;
        left: 50%;
        top: 64%;
        transform: translateX(-50%);
        display: none;
        padding: 13px 30px;
        font-family: system-ui, sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        background: #2e7d32;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
      }
      #restart:hover {
        background: #3a9d40;
      }
      #restart:active {
        transform: translateX(-50%) scale(0.97);
      }
      /* --- Főmenü + multiplayer lobby --- */
      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 11, 16, 0.72);
        font-family: system-ui, sans-serif;
        z-index: 20;
      }
      .overlay .panel {
        width: 340px;
        background: #20222b;
        border: 1px solid #33363f;
        border-radius: 14px;
        padding: 24px;
        color: #e8eaef;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
      }
      .overlay h1 {
        margin: 0 0 4px;
        font-size: 22px;
        text-align: center;
      }
      .overlay label {
        font-size: 13px;
        color: #a8adb8;
      }
      .overlay input,
      .overlay select {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #33363f;
        background: #1a1c23;
        color: #e8eaef;
        font-size: 15px;
      }
      .overlay select { cursor: pointer; }
      /* Autó-választó kártyák. */
      #carSelect {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      #carSelect .carswatch {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 10px;
        font-size: 14px;
        border: 1px solid #33363f;
        border-radius: 8px;
        background: #1a1c23;
        color: #e8eaef;
        cursor: pointer;
      }
      #carSelect .carswatch:hover { background: #262a35; }
      #carSelect .carswatch.active {
        border-color: #3a9d40;
        background: #223026;
      }
      #carSelect .carswatch .dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.3);
        flex-shrink: 0;
      }
      /* A szám-mező natív léptető-nyilai a sötét témához igazodjanak (ne fehér
         háttéren fehér nyilak legyenek). */
      .overlay input[type="number"] { color-scheme: dark; }
      .overlay button {
        padding: 12px 14px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        background: #33363f;
        color: #e8eaef;
      }
      .overlay button:hover:not(:disabled) { background: #40434f; }
      .overlay button:disabled { opacity: 0.45; cursor: default; }
      .overlay button.primary { background: #2e7d32; }
      .overlay button.primary:hover:not(:disabled) { background: #3a9d40; }
      .overlay button.accent { background: #3a5a8f; }
      .overlay button.accent:hover:not(:disabled) { background: #45699e; }
      .overlay .joinrow { display: flex; gap: 8px; }
      .overlay .joinrow input { flex: 1; }
      .overlay hr { border: none; border-top: 1px solid #33363f; margin: 2px 0; }
      .overlay .status { font-size: 13px; color: #d9a03f; min-height: 17px; }
      #lobbyCode {
        font-family: ui-monospace, monospace;
        font-size: 26px;
        text-align: center;
        letter-spacing: 2px;
        background: #1a1c23;
        border: 1px dashed #4a4e5c;
        border-radius: 8px;
        padding: 10px;
        user-select: all;
      }
      #lobbyPlayers { display: flex; flex-direction: column; gap: 6px; }
      #lobbyPlayers .p {
        background: #262a35;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
      }
      #standings {
        position: fixed;
        right: 12px;
        top: 12px;
        display: none;
        flex-direction: column;
        gap: 4px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        color: #e8eaef;
        background: rgba(0, 0, 0, 0.45);
        padding: 10px 14px;
        border-radius: 8px;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <b>Autós játék — 3D</b><br />
      Gyorsítás: <kbd>W</kbd> / <kbd>↑</kbd> &nbsp; Fék/tolatás: <kbd>S</kbd> / <kbd>↓</kbd><br />
      Kormány: <kbd>A</kbd><kbd>D</kbd> / <kbd>←</kbd><kbd>→</kbd> &nbsp; Drift: <kbd>Space</kbd> &nbsp; Némítás: <kbd>M</kbd><br />
      <span id="speed">Sebesség: 0 km/h</span>
      <div style="margin-top: 6px;">
        <a href="./editor.html">🏗️ Pálya szerkesztése</a>
      </div>
    </div>

    <!-- Kör- és időkijelző (jól látható, felül középen) -->
    <div id="raceinfo">
      <div class="ri-lap"><span class="ri-label">KÖR</span> <span id="lap">–</span></div>
      <div class="ri-times">
        <div class="ri-row"><span class="ri-label">Köridő</span> <b id="laptime">–</b></div>
        <div class="ri-row ri-best"><span class="ri-label">🏆 Legjobb</span> <b id="bestlap">–</b></div>
      </div>
    </div>

    <div id="countdown"></div>
    <div id="wrongway">
      <span class="sign">⛔</span>
      <span>ROSSZ IRÁNY!</span>
    </div>
    <button id="restart">🔄 Új verseny</button>

    <!-- Főmenü: mód-választás (egyjátékos / multiplayer szoba) -->
    <div id="menu" class="overlay">
      <div class="panel">
        <h1>🏎️ Autós játék</h1>
        <label for="playerName">Neved</label>
        <input id="playerName" maxlength="20" placeholder="Játékos" />
        <label for="trackSelect">Pálya</label>
        <select id="trackSelect">
          <option value="">🏁 Alap pálya (beépített)</option>
        </select>
        <label for="lapsInput">Körök száma</label>
        <input id="lapsInput" type="number" min="1" max="50" step="1" value="3" />
        <label>Autó</label>
        <div id="carSelect"></div>
        <button id="btnSingle" class="primary">🏁 Egyjátékos</button>
        <hr />
        <button id="btnCreate" class="accent">👥 Szoba létrehozása</button>
        <div class="joinrow">
          <input id="joinCode" placeholder="Szoba-kód" />
          <button id="btnJoin">Csatlakozás</button>
        </div>
        <div id="menuStatus" class="status"></div>
      </div>
    </div>

    <!-- Multiplayer lobby: szoba-kód + játékoslista + indítás (host) -->
    <div id="lobby" class="overlay">
      <div class="panel">
        <h1>👥 Szoba</h1>
        <label>Küldd el ezt a kódot a barátaidnak:</label>
        <div id="lobbyCode"></div>
        <div id="lobbyPlayers"></div>
        <button id="btnStart" class="primary" style="display:none">🚦 Verseny indítása</button>
        <div id="lobbyStatus" class="status">Várakozás a játékosokra…</div>
        <button id="btnLeave">← Kilépés a szobából</button>
      </div>
    </div>

    <!-- Élő állás (multiplayer verseny közben) -->
    <div id="standings"></div>

    <!-- Végeredmény (verseny vége — teljes helyezés-lista) -->
    <div id="results" class="overlay">
      <div class="panel">
        <h1>🏁 Végeredmény</h1>
        <div id="resultsList"></div>
        <button id="btnResultsAgain" class="primary" style="display:none">🔄 Új verseny</button>
        <button id="btnResultsLeave">← Vissza a menübe</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
